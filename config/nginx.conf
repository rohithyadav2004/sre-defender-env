daemon off;
worker_processes 1;
pid /app/nginx.pid;
error_log /app/logs/nginx_error.log;

events {
    worker_connections 256;
}

http {
    log_format main '$remote_addr - $http_x_forwarded_for - "$request" $status $body_bytes_sent';
    access_log /app/logs/nginx_access.log main;

    # Trust XFF from loopback (traffic generator runs on localhost inside Docker)
    # This makes $remote_addr = XFF IP so "deny <ip>;" rules work correctly
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;

    limit_req_zone $http_x_forwarded_for zone=per_ip:10m rate=10r/s;
    limit_req_zone $http_x_forwarded_for zone=login_zone:10m rate=5r/s;
    # Return 429 (not 503) so the grader's "status == 429" check passes
    limit_req_status 429;

    server {
        listen 8080;

        include /app/config/agent_rules.conf;

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header X-Forwarded-For $http_x_forwarded_for;
            proxy_set_header Host $host;
        }
    }
}
